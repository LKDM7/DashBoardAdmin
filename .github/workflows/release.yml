name: Release

# Pousser un tag « vX.Y.Z » déclenche le build + la création de la release GitHub
# avec le .jar attaché (remplace la copie manuelle dans releases/).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Locate jar
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v -- '-sources.jar' | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.jar.outputs.path }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
